<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>

    <link rel="stylesheet" href="Task5.css">
</head>

<body>

    <!-- Navigation Bar -->
    <nav class="navbar">

        <div class="logo">
            📚 LibraryMS
        </div>

        <ul class="nav-links">
            <li><a href="#dashboard">Dashboard</a></li>
            <li><a href="#addBook">Add Book</a></li>
            <li><a href="#bookList">Book List</a></li>
        </ul>

    </nav>

    <div class="container">

        <h1>Library Management System</h1>

        <!-- Dashboard Section -->
        <section class="section" id="dashboard">
            <h2>Dashboard</h2>

            <div class="dashboard">

                <div class="card">
                    <h3>Total Books</h3>
                    <p id="totalBooks">0</p>
                </div>

                <div class="card">
                    <h3>Available Books</h3>
                    <p id="availableBooks">0</p>
                </div>

                <div class="card">
                    <h3>Issued Books</h3>
                    <p id="issuedBooks">0</p>
                </div>

            </div>
        </section>

        <!-- Add Book Section -->
        <section class="section" id="addBook">
            <h2>Add Book</h2>

            <form id="bookForm">

                <label for="bookId">Book ID</label>
                <input type="text" id="bookId" placeholder="Enter Book ID">

                <label for="bookTitle">Book Title</label>
                <input type="text" id="bookTitle" placeholder="Enter Book Title">

                <label for="author">Author</label>
                <input type="text" id="author" placeholder="Enter Author Name">

                <label for="category">Category</label>
                <input type="text" id="category" placeholder="Enter Category">

                <label for="status">Status</label>
                <select id="status">
                    <option value="Available">Available</option>
                    <option value="Issued">Issued</option>
                </select>

                <button type="submit">Add Book</button>

            </form>
        </section>

        <!-- Book List Section -->
        <section class="section" id="bookList">

            <h2>Book List</h2>

            <label for="searchBook">Search Book</label>

            <input
                type="text"
                id="searchBook"
                placeholder="Search by ID, Title, Author, Category or Status">

            <div class="table-container">

                <table id="bookTable">

                    <thead>
                        <tr>
                            <th>Book ID</th>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody id="bookTableBody">

                    </tbody>

                </table>

            </div>

        </section>

    </div>

    <script src="Task5.js"></script>

</body>

</html>
